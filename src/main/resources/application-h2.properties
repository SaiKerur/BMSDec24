spring.application.name=BMSDec24

# Run the app without requiring MySQL (use: --spring.profiles.active=h2)
spring.datasource.url=jdbc:h2:mem:bms;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.sql.init.mode=never

# Optional: access H2 console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Run this profile on port 8087 instead of 8080
server.port=8087
