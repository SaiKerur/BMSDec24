spring.application.name=BMSDec24-test

# Use an in-memory DB for tests so @SpringBootTest can start without local MySQL.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Avoid running SQL init scripts during tests unless explicitly added.
spring.sql.init.mode=never
